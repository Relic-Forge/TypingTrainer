<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#303030"/>
      <stop offset="1" stop-color="#272727"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d3d3d"/>
      <stop offset="1" stop-color="#343434"/>
    </linearGradient>
    <style>
      text { font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .top { fill:#050505; }
      .bg { fill:#151515; }
      .kpi { fill:url(#cardGrad); stroke:#4a4a4a; stroke-width:1.5; }
      .kpi-label { fill:#b9b9b9; font-size:20px; font-weight:700; letter-spacing:.5px; }
      .kpi-value { fill:#f6f6f6; font-size:44px; font-weight:800; }
      .tab-bg { fill:#252525; stroke:#505050; stroke-width:1.5; }
      .tab { fill:#2a2a2a; }
      .tab-active { fill:#4b9bff; }
      .tab-text { fill:#cfcfcf; font-size:22px; font-weight:800; }
      .tab-active-text { fill:#05111f; font-size:22px; font-weight:900; }
      .chart-card { fill:url(#chartGrad); }
      .grid { stroke:rgba(255,255,255,.13); stroke-width:1; }
      .axis { stroke:rgba(255,255,255,.55); stroke-width:2; }
      .axis-label { fill:#e7e7e7; font-size:18px; font-weight:800; }
      .tick { fill:#cfcfcf; font-size:18px; font-weight:800; }
      .legend { fill:#f6f6f6; font-size:24px; font-weight:800; }
      .wpm { stroke:#35e43b; stroke-width:8; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .acc { stroke:#4f8cff; stroke-width:8; fill:none; stroke-linecap:round; stroke-linejoin:round; }
      .wpm-dot { fill:#35e43b; stroke:#343434; stroke-width:6; }
      .acc-dot { fill:#4f8cff; stroke:#343434; stroke-width:6; }
      .latest-ring { fill:none; stroke:#ffffff; stroke-width:4; opacity:.9; }
    </style>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <rect class="top" width="1600" height="94"/>
  <text x="800" y="58" text-anchor="middle" fill="#ffffff" font-size="42" font-weight="800">Statistics</text>
  <text x="46" y="58" fill="#d9d9d9" font-size="38" font-weight="700">⚙</text>
  <text x="1320" y="58" fill="#ffffff" font-size="34" font-weight="800">11:06 AM</text>
  <line x1="1460" y1="25" x2="1460" y2="69" stroke="#c7bd9c" stroke-width="4"/>
  <text x="1510" y="58" fill="#ffffff" font-size="34" font-weight="800">🔥 2</text>

  <!-- KPI row -->
  <g transform="translate(72 132)">
    <rect class="kpi" x="0" y="0" width="276" height="118" rx="28"/>
    <text class="kpi-label" x="30" y="38">AVG WPM</text>
    <text class="kpi-value" x="30" y="88">62</text>

    <rect class="kpi" x="306" y="0" width="276" height="118" rx="28"/>
    <text class="kpi-label" x="336" y="38">BEST WPM</text>
    <text class="kpi-value" x="336" y="88">64</text>

    <rect class="kpi" x="612" y="0" width="276" height="118" rx="28"/>
    <text class="kpi-label" x="642" y="38">AVG ACC</text>
    <text class="kpi-value" x="642" y="88">98.1%</text>

    <rect class="kpi" x="918" y="0" width="276" height="118" rx="28"/>
    <text class="kpi-label" x="948" y="38">STREAK</text>
    <text class="kpi-value" x="948" y="88">2 days</text>

    <rect class="kpi" x="1224" y="0" width="276" height="118" rx="28"/>
    <text class="kpi-label" x="1254" y="38">SESSIONS</text>
    <text class="kpi-value" x="1254" y="88">10</text>
  </g>

  <!-- Main chart card -->
  <g transform="translate(72 282)" filter="url(#softShadow)">
    <rect class="chart-card" x="0" y="0" width="1456" height="598" rx="52"/>
  </g>

  <!-- Tabs -->
  <g transform="translate(480 310)">
    <rect class="tab-bg" x="0" y="0" width="640" height="70" rx="35"/>
    <rect class="tab-active" x="10" y="10" width="144" height="50" rx="25"/>
    <text class="tab-active-text" x="82" y="43" text-anchor="middle">Recent</text>
    <text class="tab-text" x="236" y="43" text-anchor="middle">Daily</text>
    <text class="tab-text" x="386" y="43" text-anchor="middle">Monthly</text>
    <text class="tab-text" x="535" y="43" text-anchor="middle">Top Speeds</text>
  </g>

  <!-- Legend -->
  <g transform="translate(162 402)">
    <circle cx="18" cy="18" r="12" fill="#35e43b"/>
    <text class="legend" x="46" y="27">WPM</text>
    <circle cx="164" cy="18" r="12" fill="#4f8cff"/>
    <text class="legend" x="192" y="27">Accuracy</text>
  </g>

  <!-- Chart area -->
  <g transform="translate(162 470)">
    <!-- plot bounds x:80..1228 y:0..312 -->
    <line class="grid" x1="80" y1="0" x2="1228" y2="0"/>
    <line class="grid" x1="80" y1="78" x2="1228" y2="78"/>
    <line class="grid" x1="80" y1="156" x2="1228" y2="156"/>
    <line class="grid" x1="80" y1="234" x2="1228" y2="234"/>
    <line class="grid" x1="80" y1="312" x2="1228" y2="312"/>

    <line class="axis" x1="80" y1="0" x2="80" y2="312"/>
    <line class="axis" x1="1228" y1="0" x2="1228" y2="312"/>
    <line class="axis" x1="80" y1="312" x2="1228" y2="312"/>

    <text class="axis-label" x="80" y="-20" text-anchor="start">WPM</text>
    <text class="axis-label" x="1228" y="-20" text-anchor="end">Accuracy</text>

    <text class="tick" x="58" y="318" text-anchor="end">58</text>
    <text class="tick" x="58" y="240" text-anchor="end">60</text>
    <text class="tick" x="58" y="162" text-anchor="end">62</text>
    <text class="tick" x="58" y="84" text-anchor="end">64</text>
    <text class="tick" x="1250" y="318" text-anchor="start">95%</text>
    <text class="tick" x="1250" y="240" text-anchor="start">97%</text>
    <text class="tick" x="1250" y="162" text-anchor="start">99%</text>
    <text class="tick" x="1250" y="6" text-anchor="start">100%</text>

    <!-- x labels -->
    <text class="tick" x="80" y="364" text-anchor="middle">#1</text>
    <text class="tick" x="208" y="364" text-anchor="middle">#2</text>
    <text class="tick" x="335" y="364" text-anchor="middle">#3</text>
    <text class="tick" x="463" y="364" text-anchor="middle">#4</text>
    <text class="tick" x="590" y="364" text-anchor="middle">#5</text>
    <text class="tick" x="718" y="364" text-anchor="middle">#6</text>
    <text class="tick" x="845" y="364" text-anchor="middle">#7</text>
    <text class="tick" x="973" y="364" text-anchor="middle">#8</text>
    <text class="tick" x="1100" y="364" text-anchor="middle">#9</text>
    <text class="tick" x="1228" y="364" text-anchor="middle">#10</text>

    <!-- WPM line scaled 58-66 -->
    <polyline class="wpm" points="80,273 208,234 335,195 463,234 590,156 718,195 845,117 973,156 1100,78 1228,117"/>
    <!-- Accuracy line scaled 95-100 -->
    <polyline class="acc" points="80,250 208,156 335,200 463,125 590,175 718,94 845,62 973,87 1100,50 1228,75"/>

    <circle class="wpm-dot" cx="80" cy="273" r="11"/>
    <circle class="wpm-dot" cx="208" cy="234" r="11"/>
    <circle class="wpm-dot" cx="335" cy="195" r="11"/>
    <circle class="wpm-dot" cx="463" cy="234" r="11"/>
    <circle class="wpm-dot" cx="590" cy="156" r="11"/>
    <circle class="wpm-dot" cx="718" cy="195" r="11"/>
    <circle class="wpm-dot" cx="845" cy="117" r="11"/>
    <circle class="wpm-dot" cx="973" cy="156" r="11"/>
    <circle class="wpm-dot" cx="1100" cy="78" r="11"/>
    <circle class="wpm-dot" cx="1228" cy="117" r="11"/>

    <circle class="acc-dot" cx="80" cy="250" r="10"/>
    <circle class="acc-dot" cx="208" cy="156" r="10"/>
    <circle class="acc-dot" cx="335" cy="200" r="10"/>
    <circle class="acc-dot" cx="463" cy="125" r="10"/>
    <circle class="acc-dot" cx="590" cy="175" r="10"/>
    <circle class="acc-dot" cx="718" cy="94" r="10"/>
    <circle class="acc-dot" cx="845" cy="62" r="10"/>
    <circle class="acc-dot" cx="973" cy="87" r="10"/>
    <circle class="acc-dot" cx="1100" cy="50" r="10"/>
    <circle class="acc-dot" cx="1228" cy="75" r="10"/>

    <circle class="latest-ring" cx="1228" cy="117" r="18"/>
    <circle class="latest-ring" cx="1228" cy="75" r="17"/>
  </g>

  <rect x="0" y="894" width="1600" height="86" fill="#1f1f1f"/>
  <line x1="0" y1="894" x2="1600" y2="894" stroke="#6f6f6f"/>
  <text x="290" y="950" fill="#f3f3f3" font-size="42" font-weight="400" text-anchor="middle">Home</text>
  <text x="780" y="950" fill="#f3f3f3" font-size="42" font-weight="400" text-anchor="middle">Focus Points</text>
  <rect x="1060" y="908" width="400" height="58" rx="22" fill="#343434"/>
  <text x="1260" y="950" fill="#f3f3f3" font-size="42" font-weight="600" text-anchor="middle">Statistics</text>
</svg>