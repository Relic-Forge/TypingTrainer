<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="cardGrad" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#3f3f3f"/>
      <stop offset="100%" stop-color="#353535"/>
    </linearGradient>
    <style>
      .bg { fill: #151515; }
      .topbar { fill: #050505; }
      .nav { fill: #1f1f1f; }
      .text { fill: #f6f6f6; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #b9b9b9; font-family: Inter, Arial, sans-serif; }
      .axis { stroke: rgba(255,255,255,.58); stroke-width: 3; vector-effect: non-scaling-stroke; }
      .grid { stroke: rgba(255,255,255,.13); stroke-width: 1.5; vector-effect: non-scaling-stroke; }
      .green { fill: #39e43b; }
      .blue { fill: #4f8cff; }
      .blue-stroke { stroke: #4f8cff; fill: none; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .green-stroke { stroke: #39e43b; fill: none; stroke-width: 8; stroke-linecap: round; stroke-linejoin: round; }
      .ghost { fill: rgba(255,255,255,.08); }
      .card { fill: url(#cardGrad); }
      .kpi { fill: #2f2f2f; stroke: rgba(255,255,255,.08); stroke-width: 1.5; }
      .tab-bg { fill: #262626; stroke: rgba(255,255,255,.13); stroke-width: 2; }
      .tab-active { fill: #4b9bff; }
      .tab-label { font-family: Inter, Arial, sans-serif; font-weight: 800; font-size: 25px; }
      .label { fill: #dedede; font-family: Inter, Arial, sans-serif; font-weight: 800; font-size: 18px; }
      .small { fill: #cfcfcf; font-family: Inter, Arial, sans-serif; font-weight: 700; font-size: 16px; }
      .value-label { fill: #ffffff; font-family: Inter, Arial, sans-serif; font-weight: 900; font-size: 22px; }
    </style>
  </defs>

  <rect width="1600" height="1000" class="bg"/>
  <rect x="0" y="0" width="1600" height="82" class="topbar"/>
  <text x="800" y="53" text-anchor="middle" class="text" font-size="38" font-weight="700">Statistics</text>
  <text x="64" y="54" class="text" font-size="34">⚙</text>
  <text x="1300" y="52" class="text" font-size="33" font-weight="700">11:06 AM</text>
  <line x1="1450" y1="23" x2="1450" y2="62" stroke="#c7bd9c" stroke-width="4"/>
  <text x="1490" y="52" class="text" font-size="32" font-weight="800">🔥 1</text>

  <rect x="82" y="114" width="270" height="96" rx="28" class="kpi"/>
  <text x="112" y="150" class="muted" font-size="18" font-weight="800">Avg WPM</text>
  <text x="112" y="192" class="text" font-size="42" font-weight="900">62</text>

  <rect x="382" y="114" width="270" height="96" rx="28" class="kpi"/>
  <text x="412" y="150" class="muted" font-size="18" font-weight="800">Best WPM</text>
  <text x="412" y="192" class="text" font-size="42" font-weight="900">68</text>

  <rect x="682" y="114" width="270" height="96" rx="28" class="kpi"/>
  <text x="712" y="150" class="muted" font-size="18" font-weight="800">Avg Accuracy</text>
  <text x="712" y="192" class="text" font-size="42" font-weight="900">98.1%</text>

  <rect x="982" y="114" width="270" height="96" rx="28" class="kpi"/>
  <text x="1012" y="150" class="muted" font-size="18" font-weight="800">Current Streak</text>
  <text x="1012" y="192" class="text" font-size="42" font-weight="900">4 days</text>

  <rect x="1282" y="114" width="236" height="96" rx="28" class="kpi"/>
  <text x="1312" y="150" class="muted" font-size="18" font-weight="800">Sessions</text>
  <text x="1312" y="192" class="text" font-size="42" font-weight="900">18</text>

  <rect x="394" y="188" width="786" height="98" rx="49" class="tab-bg"/>
  <text x="544.0" y="246" text-anchor="middle" fill="#b9b9b9" class="tab-label">Recent</text><text x="699.0" y="246" text-anchor="middle" fill="#b9b9b9" class="tab-label">Daily</text><rect x="780" y="206" width="162" height="62" rx="31" class="tab-active"/><text x="861.0" y="246" text-anchor="middle" fill="#071108" class="tab-label">Monthly</text><text x="1063.0" y="246" text-anchor="middle" fill="#b9b9b9" class="tab-label">Top Speeds</text>

  <rect x="96" y="300" width="1408" height="560" rx="56" class="card" filter="url(#softShadow)"/>

  <g transform="translate(170,348)">
    <!-- plot dimensions: 1180 x 410 -->
    <line x1="0" y1="0" x2="0" y2="410" class="axis"/>
    <line x1="1180" y1="0" x2="1180" y2="410" class="axis"/>
    <line x1="0" y1="410" x2="1180" y2="410" class="axis"/>

    <!-- grid + labels left sessions 0-12, right WPM 52-70 -->
    <line x1="0" y1="410" x2="1180" y2="410" class="grid"/>
    <text x="-18" y="416" text-anchor="end" class="label">0</text>
    <text x="1198" y="416" text-anchor="start" class="label">52</text>

    <line x1="0" y1="273" x2="1180" y2="273" class="grid"/>
    <text x="-18" y="279" text-anchor="end" class="label">4</text>
    <text x="1198" y="279" text-anchor="start" class="label">58</text>

    <line x1="0" y1="137" x2="1180" y2="137" class="grid"/>
    <text x="-18" y="143" text-anchor="end" class="label">8</text>
    <text x="1198" y="143" text-anchor="start" class="label">64</text>

    <line x1="0" y1="0" x2="1180" y2="0" class="grid"/>
    <text x="-18" y="6" text-anchor="end" class="label">12</text>
    <text x="1198" y="6" text-anchor="start" class="label">70</text>

    <text x="0" y="-22" text-anchor="start" class="label">Sessions</text>
    <text x="1180" y="-22" text-anchor="end" class="label">Avg WPM</text>

    <!-- background columns -->
    <rect x="46" y="0" width="96" height="410" rx="48" class="ghost"/>
    <rect x="225" y="0" width="96" height="410" rx="48" class="ghost"/>
    <rect x="404" y="0" width="96" height="410" rx="48" class="ghost"/>
    <rect x="583" y="0" width="96" height="410" rx="48" class="ghost"/>
    <rect x="762" y="0" width="96" height="410" rx="48" class="ghost"/>
    <rect x="941" y="0" width="96" height="410" rx="48" class="ghost"/>

    <!-- sessions bars: Jan-Jun = 2, 4, 5, 7, 10, 12 -->
    <rect x="46" y="342" width="96" height="68" rx="14" class="green"/>
    <rect x="225" y="273" width="96" height="137" rx="14" class="green"/>
    <rect x="404" y="239" width="96" height="171" rx="14" class="green"/>
    <rect x="583" y="171" width="96" height="239" rx="14" class="green"/>
    <rect x="762" y="68" width="96" height="342" rx="14" class="green"/>
    <rect x="941" y="0" width="96" height="410" rx="14" class="green"/>

    <!-- value labels -->
    <text x="94" y="332" text-anchor="middle" class="value-label">2</text>
    <text x="273" y="263" text-anchor="middle" class="value-label">4</text>
    <text x="452" y="229" text-anchor="middle" class="value-label">5</text>
    <text x="631" y="161" text-anchor="middle" class="value-label">7</text>
    <text x="810" y="58" text-anchor="middle" class="value-label">10</text>
    <text x="989" y="-10" text-anchor="middle" class="value-label">12</text>

    <!-- average WPM line mapped to right axis 52-70 -->
    <polyline points="94,319 273,273 452,246 631,205 810,146 989,91" class="blue-stroke"/>
    <circle cx="94" cy="319" r="11" fill="#3a3a3a" stroke="#4f8cff" stroke-width="7"/>
    <circle cx="273" cy="273" r="11" fill="#3a3a3a" stroke="#4f8cff" stroke-width="7"/>
    <circle cx="452" cy="246" r="11" fill="#3a3a3a" stroke="#4f8cff" stroke-width="7"/>
    <circle cx="631" cy="205" r="11" fill="#3a3a3a" stroke="#4f8cff" stroke-width="7"/>
    <circle cx="810" cy="146" r="11" fill="#3a3a3a" stroke="#4f8cff" stroke-width="7"/>
    <circle cx="989" cy="91" r="11" fill="#3a3a3a" stroke="#4f8cff" stroke-width="7"/>

    <!-- x labels -->
    <text x="94" y="462" text-anchor="middle" class="small">Jan</text>
    <text x="273" y="462" text-anchor="middle" class="small">Feb</text>
    <text x="452" y="462" text-anchor="middle" class="small">Mar</text>
    <text x="631" y="462" text-anchor="middle" class="small">Apr</text>
    <text x="810" y="462" text-anchor="middle" class="small">May</text>
    <text x="989" y="462" text-anchor="middle" class="small">Jun</text>
  </g>

  <g transform="translate(620,805)">
    <circle cx="0" cy="0" r="11" class="green"/>
    <text x="26" y="7" class="label">Sessions</text>
    <circle cx="175" cy="0" r="11" class="blue"/>
    <text x="201" y="7" class="label">Avg WPM</text>
  </g>

  <rect x="0" y="908" width="1600" height="92" class="nav"/>
  <line x1="0" y1="908" x2="1600" y2="908" stroke="#6f6f6f"/>
  <text x="285" y="970" text-anchor="middle" class="text" font-size="45">Home</text>
  <text x="770" y="970" text-anchor="middle" class="text" font-size="45">Focus Points</text>
  <rect x="1064" y="922" width="452" height="68" rx="24" fill="#343434"/>
  <text x="1290" y="970" text-anchor="middle" class="text" font-size="45">Statistics</text>

</svg>